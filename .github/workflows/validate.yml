name: Validate

on:
  push:
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install validation tools
        run: python -m pip install --upgrade pip pytest ruff
      - name: Compile Python files
        run: python -m compileall custom_components tests
      - name: Ruff critical checks
        run: ruff check .
      - name: Run tests
        run: pytest
